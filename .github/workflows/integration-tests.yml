name: Integration Tests

on:
  push:
    branches: [ main, develop, MVC, Docker ]
  pull_request:
    branches: [ main, develop ]

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: TechMoves@Docker123
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P TechMoves@Docker123 -C -Q 'SELECT 1' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s

    env:
      ConnectionStrings__DefaultConnection: Server=localhost,1433;Database=TechMovesLogisticsDB_Test;User Id=sa;Password=TechMoves@Docker123;TrustServerCertificate=True;MultipleActiveResultSets=true

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Run integration tests
      run: dotnet test TechMovesLogistics.Tests/TechMovesLogistics.Tests.csproj --configuration Release --no-build --verbosity normal --filter "FullyQualifiedName~Integration" --logger "trx;LogFileName=integration-test-results.trx"

    - name: Publish test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: integration-test-results
        path: '**/integration-test-results.trx'
        retention-days: 30
