name: Docker Build

on:
  push:
    branches: [ main, develop, MVC, Docker ]
  pull_request:
    branches: [ main, develop ]

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build API image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: TechMovesLogistics.Api/Dockerfile
        push: false
        tags: glms-backend-api:ci
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build frontend image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: TechMoves Logistics/Dockerfile
        push: false
        tags: glms-frontend-web:ci
        cache-from: type=gha
        cache-to: type=gha,mode=max
