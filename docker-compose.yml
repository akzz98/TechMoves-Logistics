services:
  sql-server-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql-server-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "TechMoves@Docker123"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - glms-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P TechMoves@Docker123 -C -Q \"SELECT 1\" || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  glms-backend-api:
    build:
      context: .
      dockerfile: TechMovesLogistics.Api/Dockerfile
    container_name: glms-backend-api
    depends_on:
      sql-server-db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      # Internal Docker DNS — use service name, not localhost
      ConnectionStrings__DefaultConnection: "Server=sql-server-db,1433;Database=TechMovesLogisticsDB;User Id=sa;Password=TechMoves@Docker123;TrustServerCertificate=True;MultipleActiveResultSets=true"
    networks:
      - glms-network

  glms-frontend-web:
    build:
      context: .
      dockerfile: TechMoves Logistics/Dockerfile
    container_name: glms-frontend-web
    depends_on:
      - glms-backend-api
    ports:
      - "8081:8080"
    environment:
      # MVC HttpClient calls the API by compose service name
      ApiSettings__BaseUrl: "http://glms-backend-api:8080"
    networks:
      - glms-network

networks:
  glms-network:
    name: glms-network
    driver: bridge

volumes:
  sqlserver-data:
