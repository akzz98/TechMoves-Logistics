services:
  sql-server-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql-server-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - glms-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P ${MSSQL_SA_PASSWORD} -C -Q \"SELECT 1\" || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  glms-backend-api:
    build:
      context: .
      dockerfile: TechMovesLogistics.Api/Dockerfile
    container_name: glms-backend-api
    depends_on:
      sql-server-db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Server=${DB_SERVER},1433;Database=${DB_NAME};User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;MultipleActiveResultSets=true"
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Auth__Username: ${AUTH_USERNAME}
      Auth__Password: ${AUTH_PASSWORD}
      CurrencyApi__BaseUrl: ${CURRENCY_API_BASE_URL}
    volumes:
      - api-uploads:/app/wwwroot/uploads
    networks:
      - glms-network

  glms-frontend-web:
    build:
      context: .
      dockerfile: TechMoves Logistics/Dockerfile
    container_name: glms-frontend-web
    depends_on:
      - glms-backend-api
    ports:
      - "8081:8080"
    environment:
      ApiSettings__BaseUrl: ${API_INTERNAL_URL}
    networks:
      - glms-network

networks:
  glms-network:
    name: glms-network
    driver: bridge

volumes:
  sqlserver-data:
  api-uploads:
